<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百分比堆积图生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js?v=2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18/dist/xlsx.full.min.js?v=2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 25px;
            font-size: 26px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .control-panel {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .upload-section {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .upload-box {
            flex: 1;
            min-width: 280px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-box:hover {
            border-color: #1f77b4;
            background: #f0f7ff;
        }

        .upload-box.has-file {
            border-color: #2ca02c;
            background: #f0fff0;
        }

        .upload-box input[type="file"] {
            display: none;
        }

        .upload-box label {
            display: block;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .upload-text {
            color: #555;
            font-size: 13px;
        }

        .upload-text strong {
            display: block;
            color: #333;
            margin-bottom: 4px;
            font-size: 15px;
        }

        .color-palette-section {
            margin-top: 15px;
        }

        .color-palette-section h3 {
            margin-bottom: 12px;
            color: #333;
            font-size: 15px;
        }

        .palette-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .palette-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .palette-btn:hover {
            border-color: #1f77b4;
        }

        .palette-btn.active {
            border-color: #1f77b4;
            background: #1f77b4;
            color: #fff;
        }

        .palette-preview {
            display: flex;
            gap: 2px;
            margin-top: 6px;
        }

        .palette-preview span {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            display: inline-block;
        }

        .custom-colors {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .custom-color-input {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .custom-color-input input[type="color"] {
            width: 32px;
            height: 26px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .custom-color-input span {
            font-size: 11px;
            color: #666;
        }

        .generate-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1f77b4 0%, #2ca02c 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .generate-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(31, 119, 180, 0.4);
        }

        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .chart-container {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            aspect-ratio: 16/9;
            position: relative;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        .status-message {
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            display: none;
            font-size: 14px;
        }

        .status-message.success {
            background: #f0fff0;
            border: 1px solid #b7eb8f;
            color: #2ca02c;
            display: block;
        }

        .status-message.error {
            background: #fff5f5;
            border: 1px solid #ffccc7;
            color: #d62728;
            display: block;
        }

        .data-preview {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            max-height: 120px;
            overflow: auto;
            display: none;
        }

        .data-preview.show {
            display: block;
        }

        .mapping-preview {
            margin-top: 8px;
            padding: 8px;
            background: #e6f7ff;
            border-radius: 6px;
            font-size: 12px;
            color: #1f77b4;
            display: none;
        }

        .mapping-preview.show {
            display: block;
        }

        .upload-status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upload-status.loaded {
            background: #f0fff0;
            border: 1px solid #b7eb8f;
        }

        .upload-status .status-info {
            font-size: 13px;
            color: #333;
        }

        .upload-status .status-info strong {
            display: block;
            margin-bottom: 3px;
        }

        .upload-status .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn-remove, .btn-reupload {
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-remove {
            background: #ff4d4f;
            color: #fff;
        }

        .btn-remove:hover {
            background: #ff7875;
        }

        .btn-reupload {
            background: #1f77b4;
            color: #fff;
        }

        .btn-reupload:hover {
            background: #4096ff;
        }

        .paste-hint {
            margin-top: 8px;
            font-size: 11px;
            color: #999;
            text-align: center;
        }

        .paste-hint kbd {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 百分比堆积图生成器</h1>

        <div class="control-panel">
            <div class="upload-section">
                <!-- 数据文件上传 -->
                <div class="upload-box" id="dataUploadBox" tabindex="0">
                    <input type="file" id="dataFile" accept=".csv,.xlsx,.xls" style="display:none;">
                    <label for="dataFile" id="dataFileLabel">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">
                            <strong>上传数据文件</strong>
                            支持 CSV / Excel 格式<br>
                            <small>第一列为类目，后续列为月度数据</small>
                        </div>
                        <div class="paste-hint">
                            或按 <kbd>Ctrl</kbd>+<kbd>V</kbd> 粘贴Excel数据
                        </div>
                    </label>
                    <!-- 已上传状态显示 -->
                    <div class="upload-status" id="dataStatus" style="display:none;">
                        <div class="status-info">
                            <strong>✅ 数据已加载</strong>
                            <span id="dataStatusText"></span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-reupload" onclick="reuploadData()">重新上传</button>
                            <button class="btn-remove" onclick="removeData()">移除</button>
                        </div>
                    </div>
                </div>

                <!-- Mapping文件上传 -->
                <div class="upload-box" id="mappingUploadBox" tabindex="0">
                    <input type="file" id="mappingFile" accept=".csv,.xlsx,.xls" style="display:none;">
                    <label for="mappingFile" id="mappingFileLabel">
                        <div class="upload-icon">🔄</div>
                        <div class="upload-text">
                            <strong>上传Mapping表（可选）</strong>
                            中英文类目映射<br>
                            <small>包含：类目中文、类目英文</small>
                        </div>
                        <div class="paste-hint">
                            或按 <kbd>Ctrl</kbd>+<kbd>V</kbd> 粘贴映射表
                        </div>
                    </label>
                    <!-- 已上传状态显示 -->
                    <div class="upload-status" id="mappingStatus" style="display:none;">
                        <div class="status-info">
                            <strong>✅ Mapping已加载</strong>
                            <span id="mappingStatusText"></span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-reupload" onclick="reuploadMapping()">重新上传</button>
                            <button class="btn-remove" onclick="removeMapping()">移除</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="color-palette-section">
                <h3>🎨 选择色盘</h3>
                <div class="palette-options" id="paletteOptions">
                    <button class="palette-btn active" data-palette="business">
                        商务色盘（默认）
                        <div class="palette-preview">
                            <span style="background:#1f77b4"></span>
                            <span style="background:#ff7f0e"></span>
                            <span style="background:#2ca02c"></span>
                            <span style="background:#d62728"></span>
                            <span style="background:#9467bd"></span>
                            <span style="background:#8c564b"></span>
                        </div>
                    </button>
                    <button class="palette-btn" data-palette="default">
                        默认色盘
                        <div class="palette-preview">
                            <span style="background:#5470c6"></span>
                            <span style="background:#91cc75"></span>
                            <span style="background:#fac858"></span>
                            <span style="background:#ee6666"></span>
                            <span style="background:#73c0de"></span>
                            <span style="background:#3ba272"></span>
                        </div>
                    </button>
                    <button class="palette-btn" data-palette="vivid">
                        鲜艳色盘
                        <div class="palette-preview">
                            <span style="background:#ff6b6b"></span>
                            <span style="background:#feca57"></span>
                            <span style="background:#48dbfb"></span>
                            <span style="background:#ff9ff3"></span>
                            <span style="background:#54a0ff"></span>
                            <span style="background:#5f27cd"></span>
                        </div>
                    </button>
                    <button class="palette-btn" data-palette="pastel">
                        柔和色盘
                        <div class="palette-preview">
                            <span style="background:#a8d8ea"></span>
                            <span style="background:#aa96da"></span>
                            <span style="background:#fcbad3"></span>
                            <span style="background:#ffffd2"></span>
                            <span style="background:#a8e6cf"></span>
                            <span style="background:#dcedc1"></span>
                        </div>
                    </button>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn" disabled>生成图表</button>
            <div class="status-message" id="statusMessage"></div>
        </div>

        <div class="chart-container">
            <div id="chart"></div>
        </div>
    </div>

    <script>
        // 全局变量
        let rawData = null;
        let mappingData = null;
        let selectedPalette = 'business';

        // 色盘定义
        const palettes = {
            business: ['#1f77b4', '#ff7f0e', '#2ca02c', '#d62728', '#9467bd', '#8c564b', '#e377c2', '#7f7f7f', '#bcbd22', '#17becf', '#aec7e8', '#ffbb78', '#98df8a', '#ff9896', '#c5b0d5', '#c49c94', '#f7b6d2', '#c7c7c7', '#dbdb8d', '#9edae5', '#6baed6', '#fd8d3c', '#74c476', '#fb6a4a', '#9e9ac8', '#a67c52', '#f1a340', '#99d8c9', '#e34a33', '#6a51a3'],
            default: ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452', '#9a60b4', '#ea7ccc', '#6e7079', '#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452', '#9a60b4', '#ea7ccc', '#6e7079'],
            vivid: ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3', '#ff9f43', '#ee5a24', '#0abde3', '#10ac84', '#e84393', '#6c5ce7', '#fdcb6e', '#e17055', '#00cec9', '#d63031', '#0984e3', '#fd79a8', '#636e72'],
            pastel: ['#a8d8ea', '#aa96da', '#fcbad3', '#ffffd2', '#a8e6cf', '#dcedc1', '#ffd3b6', '#ffaaa5', '#ff8b94', '#a3de83', '#7ec8e3', '#c7ceea', '#ffdac1', '#b5ead7', '#e2f0cb', '#c7ceea', '#ffdac1', '#b5ead7', '#e2f0cb', '#c7ceea']
        };

        // DOM元素
        const dataFileInput = document.getElementById('dataFile');
        const mappingFileInput = document.getElementById('mappingFile');
        const dataUploadBox = document.getElementById('dataUploadBox');
        const mappingUploadBox = document.getElementById('mappingUploadBox');
        const dataFileLabel = document.getElementById('dataFileLabel');
        const mappingFileLabel = document.getElementById('mappingFileLabel');
        const dataStatus = document.getElementById('dataStatus');
        const mappingStatus = document.getElementById('mappingStatus');
        const dataStatusText = document.getElementById('dataStatusText');
        const mappingStatusText = document.getElementById('mappingStatusText');
        const generateBtn = document.getElementById('generateBtn');
        const statusMessage = document.getElementById('statusMessage');
        const paletteOptions = document.getElementById('paletteOptions');
        const customColors = document.getElementById('customColors');
        const chart = echarts.init(document.getElementById('chart'));

        // 格式化月份：2024-03 -> Mar-24
        function formatMonth(monthStr) {
            if (!monthStr) return monthStr;
            
            const monthStrClean = String(monthStr).trim();
            
            // 匹配 YYYYMM 或 YYYY-MM 或 YYYY/MM 格式
            let year, month;
            
            if (/^\d{6}$/.test(monthStrClean)) {
                // 202403 格式
                year = monthStrClean.substring(0, 4);
                month = monthStrClean.substring(4, 6);
            } else {
                const match = monthStrClean.match(/(\d{4})[-/](\d{1,2})/);
                if (match) {
                    year = match[1];
                    month = match[2].padStart(2, '0');
                } else {
                    return monthStrClean; // 无法识别的格式，原样返回
                }
            }
            
            const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const monthIdx = parseInt(month) - 1;
            const shortYear = year.substring(2); // 取后两位
            
            if (monthIdx >= 0 && monthIdx < 12) {
                return `${monthNames[monthIdx]}-${shortYear}`;
            }
            
            return monthStrClean;
        }

        // 页面加载时检查缓存
        window.addEventListener('load', function() {
            loadFromCache();
        });

        // 从缓存加载数据
        function loadFromCache() {
            try {
                const cachedData = localStorage.getItem('chartRawData');
                const cachedMapping = localStorage.getItem('chartMappingData');
                
                if (cachedData) {
                    rawData = JSON.parse(cachedData);
                    showDataStatus(rawData.length - 1, rawData[0].length - 1);
                }
                if (cachedMapping) {
                    const mappingArr = JSON.parse(cachedMapping);
                    mappingData = new Map(mappingArr);
                    showMappingStatus(mappingData.size);
                }
                checkReady();
            } catch (e) {
                console.error('缓存加载失败:', e);
                clearCache();
            }
        }

        // 保存到缓存
        function saveToCache() {
            try {
                if (rawData) {
                    localStorage.setItem('chartRawData', JSON.stringify(rawData));
                }
                if (mappingData && mappingData.size > 0) {
                    localStorage.setItem('chartMappingData', JSON.stringify([...mappingData]));
                }
            } catch (e) {
                console.error('缓存保存失败:', e);
            }
        }

        // 清除缓存
        function clearCache() {
            localStorage.removeItem('chartRawData');
            localStorage.removeItem('chartMappingData');
        }

        // 显示数据状态
        function showDataStatus(categories, months) {
            dataFileLabel.style.display = 'none';
            dataStatus.style.display = 'flex';
            dataStatus.classList.add('loaded');
            dataStatusText.textContent = `${categories} 个类目，${months} 个月份`;
            dataUploadBox.classList.add('has-file');
        }

        // 显示Mapping状态
        function showMappingStatus(count) {
            mappingFileLabel.style.display = 'none';
            mappingStatus.style.display = 'flex';
            mappingStatus.classList.add('loaded');
            mappingStatusText.textContent = `${count} 条映射关系`;
            mappingUploadBox.classList.add('has-file');
        }

        // 隐藏数据状态
        function hideDataStatus() {
            dataFileLabel.style.display = 'block';
            dataStatus.style.display = 'none';
            dataStatus.classList.remove('loaded');
            dataUploadBox.classList.remove('has-file');
        }

        // 隐藏Mapping状态
        function hideMappingStatus() {
            mappingFileLabel.style.display = 'block';
            mappingStatus.style.display = 'none';
            mappingStatus.classList.remove('loaded');
            mappingUploadBox.classList.remove('has-file');
        }

        // 移除数据
        function removeData() {
            rawData = null;
            hideDataStatus();
            clearCache();
            checkReady();
            showStatus('success', '数据已移除');
        }

        // 移除Mapping
        function removeMapping() {
            mappingData = null;
            hideMappingStatus();
            clearCache();
            checkReady();
            showStatus('success', 'Mapping已移除');
        }

        // 重新上传数据
        function reuploadData() {
            dataFileInput.click();
        }

        // 重新上传Mapping
        function reuploadMapping() {
            mappingFileInput.click();
        }

        // 全局粘贴事件
        document.addEventListener('paste', function(e) {
            // 如果正在输入框中，不处理
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            const items = e.clipboardData.items;
            let hasData = false;
            
            for (let i = 0; i < items.length; i++) {
                if (items[i].type === 'text/plain') {
                    hasData = true;
                    items[i].getAsString(function(text) {
                        handlePasteData(text);
                    });
                    break;
                }
            }
            
            if (!hasData) {
                showStatus('error', '剪贴板中没有文本数据');
            }
        });

        // 处理粘贴的数据
        function handlePasteData(text) {
            try {
                // 解析粘贴的文本（Tab或逗号分隔）
                const lines = text.trim().split('\n').filter(line => line.trim());
                const data = lines.map(line => line.split(/[\t,]/).map(cell => cell.trim()));
                
                // 判断是数据还是Mapping
                if (data[0].length === 2 && (data[0][0].includes('中文') || data[0][0].includes('类目'))) {
                    // 可能是Mapping表
                    processPastedMapping(data);
                } else {
                    // 当作数据文件处理
                    processPastedData(data);
                }
            } catch (e) {
                showStatus('error', '粘贴数据解析失败：' + e.message);
            }
        }

        // 处理粘贴的数据文件
        function processPastedData(data) {
            if (data.length < 2) {
                showStatus('error', '数据行数不足，请至少包含表头和一行数据');
                return;
            }
            
            rawData = data;
            showDataStatus(data.length - 1, data[0].length - 1);
            saveToCache();
            checkReady();
            showStatus('success', `成功粘贴 ${data.length - 1} 个类目，${data[0].length - 1} 个月份`);
        }

        // 处理粘贴的Mapping
        function processPastedMapping(data) {
            const map = new Map();
            for (let i = 1; i < data.length; i++) {
                if (data[i][0] && data[i][1]) {
                    map.set(data[i][0].trim(), data[i][1].trim());
                }
            }
            
            if (map.size === 0) {
                showStatus('error', '未找到有效的映射关系');
                return;
            }
            
            mappingData = map;
            showMappingStatus(map.size);
            saveToCache();
            checkReady();
            showStatus('success', `成功加载 ${map.size} 条映射关系`);
        }

        // 数据文件上传处理
        dataFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = parseFile(file, e.target.result);
                        rawData = data;
                        showDataStatus(data.length - 1, data[0].length - 1);
                        saveToCache();
                        checkReady();
                        showStatus('success', `已加载 ${data.length - 1} 个类目，${data[0].length - 1} 个月份`);
                    } catch (err) {
                        showStatus('error', '文件解析失败：' + err.message);
                    }
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // Mapping文件上传处理
        mappingFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        mappingData = parseMappingFile(file, e.target.result);
                        showMappingStatus(mappingData.size);
                        saveToCache();
                        checkReady();
                        showStatus('success', `已加载 ${mappingData.size} 条映射关系`);
                    } catch (err) {
                        showStatus('error', 'Mapping文件解析失败：' + err.message);
                    }
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // 解析数据文件
        function parseFile(file, buffer) {
            const ext = file.name.split('.').pop().toLowerCase();
            let workbook;

            if (ext === 'csv') {
                const text = new TextDecoder('utf-8').decode(buffer);
                return parseCSV(text);
            } else {
                workbook = XLSX.read(buffer, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                return XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
            }
        }

        // 解析CSV
        function parseCSV(text) {
            const lines = text.split('\n').filter(line => line.trim());
            return lines.map(line => {
                return line.split(/[,\t]/).map(cell => cell.trim().replace(/^"|"$/g, ''));
            });
        }

        // 解析Mapping文件
        function parseMappingFile(file, buffer) {
            const ext = file.name.split('.').pop().toLowerCase();
            let workbook;
            let data;

            if (ext === 'csv') {
                const text = new TextDecoder('utf-8').decode(buffer);
                data = parseCSV(text);
            } else {
                workbook = XLSX.read(buffer, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                data = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
            }

            const map = new Map();
            for (let i = 1; i < data.length; i++) {
                if (data[i][0] && data[i][1]) {
                    map.set(data[i][0].trim(), data[i][1].trim());
                }
            }
            return map;
        }

        // 检查是否准备好生成图表
        function checkReady() {
            generateBtn.disabled = !rawData;
        }

        // 色盘选择
        paletteOptions.addEventListener('click', function(e) {
            const btn = e.target.closest('.palette-btn');
            if (btn) {
                document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPalette = btn.dataset.palette;
                
                // 如果已有数据，立即重新生成图表
                if (rawData) {
                    try {
                        const chartData = processChartData(rawData);
                        renderChart(chartData);
                    } catch (err) {
                        console.error('色盘切换失败:', err);
                    }
                }
            }
        });

        // 显示状态消息
        function showStatus(type, message) {
            statusMessage.className = 'status-message ' + type;
            statusMessage.textContent = message;
            setTimeout(() => {
                statusMessage.className = 'status-message';
            }, 3000);
        }

        // 生成图表
        generateBtn.addEventListener('click', function() {
            if (!rawData) return;

            try {
                const chartData = processChartData(rawData);
                renderChart(chartData);
                showStatus('success', '图表生成成功！');
            } catch (err) {
                showStatus('error', '图表生成失败：' + err.message);
                console.error(err);
            }
        });

        // 处理图表数据
        function processChartData(data) {
            // 提取月份（第一行，跳过第一列）并格式化
            const rawMonths = data[0].slice(1);
            const months = rawMonths.map(m => formatMonth(m));

            // 提取类目数据（跳过最后一行"总计"）
            const categories = [];

            for (let i = 1; i < data.length - 1; i++) {
                const row = data[i];
                const name = row[0];
                if (!name || name === '总计') continue; // 跳过空行和总计行
                const values = row.slice(1).map(v => parseFloat(v) || 0);
                const total = values.reduce((a, b) => a + b, 0);
                if (total === 0) continue; // 跳过总计为0的类目

                categories.push({ name, values, total });
            }

            console.log('原始类目数量:', categories.length);

            // 按24个月总计降序排序（金额大的排前面）
            categories.sort((a, b) => b.total - a.total);

            // 计算总总计
            const grandTotal = categories.reduce((sum, cat) => sum + cat.total, 0);

            console.log('总总计:', grandTotal);

            // === 计算95%阈值：筛选金额降序的前95%的类目 ===
            let cumulativePercent95 = 0;
            let legendCutoffIndex = categories.length - 1; // 默认全部显示
            for (let i = 0; i < categories.length; i++) {
                cumulativePercent95 += categories[i].total / grandTotal;
                if (cumulativePercent95 > 0.95) {
                    legendCutoffIndex = i;
                    break;
                }
            }

            console.log('95%阈值索引:', legendCutoffIndex, '累计占比:', (cumulativePercent95 * 100).toFixed(1) + '%');

            // === 计算80%阈值：标签显示筛选 ===
            let cumulativePercent80 = 0;
            let labelCutoffIndex = categories.length - 1; // 默认全部显示
            for (let i = 0; i < categories.length; i++) {
                cumulativePercent80 += categories[i].total / grandTotal;
                if (cumulativePercent80 > 0.80) {
                    labelCutoffIndex = i;
                    break;
                }
            }

            console.log('80%阈值索引:', labelCutoffIndex, '累计占比:', (cumulativePercent80 * 100).toFixed(1) + '%');

            // === 构建显示类目列表 ===
            // 面积图stack顺序：series数组中索引小的在下方，索引大的在上方
            // 要求：金额大的在下方，Other在最上方
            // 策略：先放金额大的（下方），再放金额小的（上方），最后放Other（最上方）

            const top95Categories = [];
            const otherValues = new Array(months.length).fill(0);
            let otherTotal = 0;

            categories.forEach((cat, idx) => {
                if (idx <= legendCutoffIndex) {
                    // 在前95%内的类目
                    top95Categories.push({
                        name: cat.name,
                        values: cat.values,
                        total: cat.total,
                        percent: cat.total / grandTotal,
                        showLabel: idx <= labelCutoffIndex,
                        isOther: false,
                        sortIndex: idx // 保留原始排序索引
                    });
                } else {
                    // 超过95%的归为Other
                    cat.values.forEach((v, i) => {
                        otherValues[i] += v;
                    });
                    otherTotal += cat.total;
                }
            });

            console.log('前95%类目数量:', top95Categories.length);
            console.log('Other类目数量:', categories.length - top95Categories.length);

            // 按金额降序排列（金额大的在前=下方）
            top95Categories.sort((a, b) => a.sortIndex - b.sortIndex);

            const displayCategories = [...top95Categories];

            // 如果有Other，添加到最上方（数组最后）
            if (otherTotal > 0) {
                displayCategories.push({
                    name: 'Other',
                    values: otherValues,
                    total: otherTotal,
                    percent: otherTotal / grandTotal,
                    showLabel: false,
                    isOther: true
                });
            }

            console.log('最终类目数量:', displayCategories.length);
            console.log('各类目占比:', displayCategories.map(c => ({ name: c.name, percent: (c.percent * 100).toFixed(1) + '%' })));

            return {
                months,
                categories: displayCategories,
                grandTotal,
                colors: palettes[selectedPalette]
            };
        }

        // 渲染图表
        function renderChart(data) {
            const { months, categories, colors } = data;

            // 调试信息
            console.log('=== 图表数据调试 ===');
            console.log('月份数量:', months.length);
            console.log('类目数量:', categories.length);
            console.log('当前色盘:', selectedPalette);
            console.log('颜色列表:', colors.slice(0, 5), '...');
            console.log('类目详情:', categories.map(c => ({
                name: c.name,
                total: c.total,
                percent: (c.total / data.grandTotal * 100).toFixed(1) + '%',
                valuesLength: c.values.length,
                showLabel: c.showLabel,
                isOther: c.isOther
            })));

            // 获取显示名称（有mapping则用英文，否则用中文）
            const getDisplayName = (cat) => {
                if (cat.isOther) return 'Other';
                if (mappingData && mappingData.has(cat.name)) {
                    return mappingData.get(cat.name);
                }
                return cat.name;
            };

            // 计算每个月的总计（用于label和tooltip）
            const monthTotals = months.map((_, idx) => {
                return categories.reduce((sum, cat) => sum + (cat.values[idx] || 0), 0);
            });
            console.log('月总计示例:', monthTotals.slice(0, 3));

            // 计算累积百分比位置（用于标签定位）
            const cumulativePercent = [];
            for (let m = 0; m < months.length; m++) {
                cumulativePercent[m] = [];
                let cumSum = 0;
                for (let c = 0; c < categories.length; c++) {
                    cumulativePercent[m][c] = cumSum;
                    cumSum += (categories[c].values[m] / monthTotals[m] * 100) || 0;
                }
            }

            // 构建面积图 series（不含标签）
            const seriesData = categories.map((cat, idx) => {
                const color = colors[idx % colors.length];
                
                const percentValues = cat.values.map((v, monthIdx) => {
                    const monthTotal = monthTotals[monthIdx];
                    return monthTotal > 0 ? (v / monthTotal * 100) : 0;
                });

                return {
                    name: getDisplayName(cat),
                    type: 'line',
                    stack: 'total',
                    areaStyle: {
                        opacity: 0.9,
                        color: color
                    },
                    emphasis: { focus: 'series' },
                    symbol: 'none',
                    lineStyle: { width: 0 },
                    data: percentValues,
                    itemStyle: { color: color }
                };
            });

            // 图例数据 - 使用 rich 文本实现彩色文字
            // 规则：
            // 1. Other永远在最上方
            // 2. 其他类目按金额从小到大排列（图例从上到下：小→大）
            const legendData = [];
            const richStyles = {};

            // 先添加Other（最上方）
            const otherCat = categories.find(c => c.isOther);
            if (otherCat) {
                const displayName = getDisplayName(otherCat);
                const color = colors[categories.indexOf(otherCat) % colors.length];
                const richName = 'rich_' + displayName.replace(/[^a-zA-Z0-9]/g, '_');
                richStyles[richName] = {
                    color: color,
                    fontSize: 15,
                    fontWeight: 'normal'
                };
                legendData.push({
                    name: displayName,
                    icon: 'rect',
                    itemStyle: { color: color },
                    textStyle: {
                        color: color
                    }
                });
            }

            // 再添加其他类目（按金额升序，图例从上到下：小→大）
            const nonOtherCats = categories.filter(c => !c.isOther);
            nonOtherCats.reverse().forEach((cat) => {
                const displayName = getDisplayName(cat);
                const color = colors[categories.indexOf(cat) % colors.length];
                const richName = 'rich_' + displayName.replace(/[^a-zA-Z0-9]/g, '_');
                richStyles[richName] = {
                    color: color,
                    fontSize: 15,
                    fontWeight: 'bold'
                };
                legendData.push({
                    name: displayName,
                    icon: 'rect',
                    itemStyle: { color: color },
                    textStyle: {
                        color: color
                    }
                });
            });

            console.log('色盘名称:', selectedPalette);
            console.log('颜色列表:', colors.slice(0, 5));
            console.log('图例数据:', legendData.slice(0, 3));

            // 计算图例行间距：根据图例数量和图表容器高度动态计算，使图例上下对齐图表边界
            const legendItemCount = legendData.length;
            const containerHeight = document.getElementById('chart').offsetHeight;
            const gridHeightPx = containerHeight * 0.83; // 图表区域高度 (100% - 5% top - 12% bottom)
            // 每个图例项占用的高度 ≈ 文字高度(约18px) + 间距，额外减去约2个字号(28px)收窄间距
            const totalTextHeight = legendItemCount * 18;
            const legendItemGap = Math.max(2, Math.floor((gridHeightPx - totalTextHeight - 28) / Math.max(1, legendItemCount - 1)));

            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' },
                    formatter: function(params) {
                        let result = `<b style="font-size:14px">${params[0].axisValue}</b><br/>`;
                        params.forEach(param => {
                            const monthTotal = monthTotals[param.dataIndex];
                            const percent = monthTotal > 0 ? (param.value / monthTotal * 100).toFixed(1) : 0;
                            result += `${param.marker} <span style="font-size:13px">${param.seriesName}: ${formatNumber(param.value)} (${percent}%)</span><br/>`;
                        });
                        return result;
                    },
                    textStyle: {
                        fontSize: 13
                    }
                },
                legend: {
                    data: legendData.map(l => l.name),
                    orient: 'vertical',
                    right: 10,
                    top: '5%',
                    bottom: '12%',
                    itemWidth: 18,
                    itemHeight: 14,
                    itemGap: legendItemGap,
                    textStyle: {
                        fontSize: 14,
                        rich: richStyles,
                        padding: [1, 0, 1, 0]
                    },
                    formatter: function(name) {
                        const richName = 'rich_' + name.replace(/[^a-zA-Z0-9]/g, '_');
                        const cat = categories.find(c => getDisplayName(c) === name);
                        if (cat) {
                            const percent = (cat.total / data.grandTotal * 100).toFixed(1);
                            return `{${richName}|${name}}  {${richName}|${percent}%}`;
                        }
                        return name;
                    }
                },
                grid: {
                    left: '5%',
                    right: '20%',
                    bottom: '12%',
                    top: '5%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: months,
                    boundaryGap: false,
                    axisLabel: {
                        rotate: 45,
                        fontSize: 13,
                        interval: Math.max(0, Math.floor(months.length / 24) - 1)
                    },
                    axisTick: {
                        show: true,
                        alignWithLabel: true
                    },
                    axisLine: {
                        lineStyle: { color: '#666' }
                    }
                },
                yAxis: {
                    type: 'value',
                    max: 100,
                    axisLabel: {
                        formatter: '{value}%',
                        fontSize: 14
                    },
                    splitLine: {
                        lineStyle: {
                            type: 'dashed',
                            color: '#e0e0e0'
                        }
                    },
                    axisLine: {
                        show: true,
                        lineStyle: { color: '#666' }
                    }
                },
                series: seriesData
            };

            chart.setOption(option, true);

            // 渲染完成后添加标签
            setTimeout(() => {
                const graphicElements = [];

                const PERCENT_FONT_SIZE = 12;

                // 为每个类目添加百分比标签
                categories.forEach((cat, catIdx) => {
                    for (let m = 0; m < months.length; m++) {
                        const monthPercent = (cat.values[m] / monthTotals[m] * 100) || 0;
                        if (monthPercent < 1) continue;

                        const bottomY = cumulativePercent[m][catIdx];
                        const centerY = bottomY + monthPercent / 2;

                        const point = chart.convertToPixel({ xAxisIndex: 0, yAxisIndex: 0 }, [m, centerY]);
                        if (!point) continue;

                        // 只显示百分比数值
                        graphicElements.push({
                            type: 'text',
                            style: {
                                text: monthPercent.toFixed(0) + '%',
                                fill: '#ffffff',
                                fontSize: PERCENT_FONT_SIZE,
                                fontWeight: 'bold',
                                textShadowColor: 'rgba(0,0,0,0.8)',
                                textShadowBlur: 6,
                                x: point[0],
                                y: point[1],
                                textAlign: 'center',
                                textVerticalAlign: 'middle'
                            },
                            silent: true,
                            z: 100
                        });
                    }
                });

                if (graphicElements.length > 0) {
                    console.log('添加标签数量:', graphicElements.length);
                    chart.setOption({
                        graphic: graphicElements
                    });
                }
            }, 200);
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 100000000) {
                return (num / 100000000).toFixed(2) + '亿';
            } else if (num >= 10000) {
                return (num / 10000).toFixed(1) + '万';
            }
            return num.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
        }

        // 响应式调整
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
